# @package _global_
#
# Based on randrot_noise_10distinctobj_dist_agent but using MuJoCo RobotDistantAgent
# instead of Habitat MultiSensorAgent.

# The configuration for the pretraining experiment.
defaults:
  - /monty: graph_exp500_e3_t3_tot2500
  - /monty/motor_system_config: informed_5_goal1
  - /monty/learning_module: displacement_delta_d0001
  - /monty/sensor_module: camera_dist
  - /monty/connectivity: 1lm_1sm
  - /env_interface/positioning_procedures_train: getgoodview_viewfinder_patch
  - /env_interface/transform: missing_depthto3d_sensor2_semantic0
  - /logging: basic_warning_wandb_monty_runs

experiment:
  _target_: tbp.monty.frameworks.experiments.mujoco_pretraining_experiments.MuJoCoMontySupervisedObjectPretrainingExperiment
  config:
    monty_config:
      monty_args:
        num_exploratory_steps: 500
      sensor_module_configs:
        sensor_module_0:
          sensor_module_class: ${monty.class:tbp.monty.frameworks.models.sensor_modules.CameraSM}
          sensor_module_args:
            is_surface_sm: true
            sensor_module_id: patch
            # a list of features that the SM will extract and send to the LM
            features:
              - pose_vectors
              - pose_fully_defined
              - on_object
              - object_coverage
              - rgba
              - hsv
              - min_depth
              - mean_depth
              - principal_curvatures
              - principal_curvatures_log
              - gaussian_curvature
              - mean_curvature
              - gaussian_curvature_sc
              - mean_curvature_sc
            save_raw_obs: false
        sensor_module_1:
          sensor_module_class: ${monty.class:tbp.monty.frameworks.models.sensor_modules.Probe}
          sensor_module_args:
            sensor_module_id: view_finder
            save_raw_obs: false
    # learning module config: 1 graph learning module.
    learning_module_configs:
      learning_module_0:
        learning_module_class: ${monty.class:tbp.monty.frameworks.models.graph_matching.GraphLM}
        learning_module_args: {} # Use default LM args
    show_sensor_output: false
    do_train: true
    max_train_steps: 1000
    max_eval_steps: 500
    max_total_steps: 6000
    n_train_epochs: ${constants.rotations_all_count}
    n_eval_epochs: 3
    model_name_or_path: ''
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: all
    logging:
      run_name: supervised_pre_training_robot_dist_agent_3
    environment:
      env_init_args:
        show_viewer: false
        # objects:
        # - name: coneSolid
        #   position:
        #   - 0.0
        #   - 1.5
        #   - -0.1
        # scene_id: null
        seed: 42
        data_path: /home/sergiov/tbp/data/habitat/objects/ycb
        agents:
          _target_: tbp.monty.simulators.mujoco.RobotDistantAgent
          _partial_: true
          agent_id: agent_id_0
          position: [0.0, 0.0, 0.0]
          rotation: [1.0, 0.0, 0.0, 0.0]
          robot_name: "robot:ur5e"
          ee_site_name: attachment_site
          # EE placed 35 cm above object (pos=[-0.492, -0.134, 0.738]) with the
          # camera looking straight down. Higher EE -> gripper subtends fewer pixels
          # of the patch's FOV, so randomly-rotated objects stay visible.
          home_qpos: [0.0, -1.332171, 0.600014, -0.838639, -1.570796, 1.570796]
          ik_method: "damped_ls"
          ik_args:
            max_iter: 500
            tol: 0.0001
            damping: 0.05
          sensor_configs:
            patch:
              position: [0.0, 0.0, 0.0]
              rotation: [1.0, 0.0, 0.0, 0.0]
              resolution: [64, 64]
              zoom: 10.0
            view_finder:
              position: [0.0, 0.0, 0.0]
              rotation: [1.0, 0.0, 0.0, 0.0]
              resolution: [64, 64]
              zoom: 1.0
          # sensor_configs:
          #   patch:
          #     position: [0.0, 0.0, 0.0]
          #     rotation: [1.0, 0.0, 0.0, 0.0]
          #     # 128x128 so small objects (e.g. dice ~1.7cm at 35cm) cover
          #     # enough pixels for the centre-pixel target check to land.
          #     resolution: [128, 128]
          #     zoom: 1.0
          #   view_finder:
          #     position: [0.0, 0.0, 0.0]
          #     rotation: [1.0, 0.0, 0.0, 0.0]
          #     # The MuJoCo simulator shares one offscreen buffer at the max
          #     # sensor resolution, so view_finder must match the patch's
          #     # resolution to avoid mismatched depth shapes downstream.
          #     resolution: [128, 128]
          #     # zoom 0.5 -> half-FOV 90deg (full 180deg) so a randomly-rotated
          #     # object stays visible even when the gripper occludes the centre.
          #     zoom: 0.5
      env_init_func: ${monty.class:tbp.monty.simulators.mujoco.MuJoCoEnvironment}
      # transform:
      # - _target_: tbp.monty.frameworks.environment_utils.transforms.MissingToMaxDepth
      #   agent_id: agent_id_0
      #   max_depth: 1
      # - _target_: tbp.monty.frameworks.environment_utils.transforms.DepthTo3DLocations
      #   agent_id: agent_id_0
      #   sensor_ids:
      #   - patch
      #   - view_finder
      #   resolutions:
      #   - - 128
      #     - 128
      #   - - 128
      #     - 128
      #   world_coord: true
      #   zooms:
      #   - 1.0
      #   - 0.5
      #   get_all_points: true
      #   use_semantic_sensor: false
    train_env_interface_class: ${monty.class:tbp.monty.frameworks.environments.embodied_data.EnvironmentInterfacePerObject}
    train_env_interface_args:
      positioning_procedures:
      - _target_: tbp.monty.simulators.mujoco.positioning_procedures.MuJoCoGetGoodViewFactory
        agent_id: agent_id_0
        sensor_id: view_finder
        allow_translation: true
        max_orientation_attempts: 5
      - _target_: tbp.monty.simulators.mujoco.positioning_procedures.MuJoCoGetGoodViewFactory
        agent_id: agent_id_0
        sensor_id: patch
        allow_translation: true
        max_orientation_attempts: 10
        central_region_radius: 8
      object_names:
      - mug
      # - bowl
      # - potted_meat_can
      # - spoon
      # - strawberry
      # - mustard_bottle
      # - dice
      # - golf_ball
      # - c_lego_duplo
      - banana
      object_init_sampler:
        _target_: tbp.monty.frameworks.environments.object_init_samplers.Predefined
        positions: [[-0.492, -0.134, 0.388]]
        rotations: ${constants.rotations_all}
        scales: [[1.0, 1.0, 1.0]]
    # learning module config: 1 graph learning module.
