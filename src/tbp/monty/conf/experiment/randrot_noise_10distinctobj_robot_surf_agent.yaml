# @package _global_
#
# Based on randrot_noise_10distinctobj_surf_agent but using MuJoCo RobotSurfaceAgent
# instead of Habitat MultiSensorAgent.

defaults:
  - /monty: evidencegraph_exp1000_emin_t3_tot2500
  - /monty/motor_system_config: surface_curvature_informed_goal1
  - /monty/learning_module: evidence_1lm_nn10_dod0025
  - /monty/sensor_module: camera_surf_noise_raw1
  - /monty/connectivity: 1lm_1sm
  - /env_interface: eval_distinctobj_random
  - /env_interface/transform: missing_depthto3d_sensor2_semantic0_clip
  - /logging: basic_warning_wandb_monty_runs

experiment:
  _target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
  config:
    show_sensor_output: false
    do_train: true
    max_train_steps: 1000
    max_eval_steps: 500
    max_total_steps: 5000
    n_train_epochs: 3
    model_name_or_path: ""
    n_eval_epochs: 10
    min_lms_match: 1
    seed: 42
    supervised_lm_ids: []
    python_log_level: DEBUG
    logging:
      run_name: randrot_noise_10distinctobj_robot_surf_agent
    environment:
      env_init_args:
        objects:
        - name: coneSolid
          position:
          - 0.0
          - 1.5
          - -0.1
        scene_id: null
        seed: 42
        data_path: ${path.expanduser:${oc.env:MONTY_DATA}/habitat/objects/ycb}
        agents:
          _target_: tbp.monty.simulators.mujoco.RobotSurfaceAgent
          _partial_: true
          agent_id: agent_id_0
          position: [0.0, 0.0, 0.0]
          rotation: [1.0, 0.0, 0.0, 0.0]
          robot_name: "robot:ur5e"
          ee_site_name: attachment_site
          home_qpos: [0.0, -1.570796, 1.570796, -1.570796, -1.570796, 0.0]
          ik_method: "damped_ls"
          ik_args:
            max_iter: 500
            tol: 0.0001
            damping: 0.05
          sensor_configs:
            patch:
              position: [0.0, 0.0, 0.0]
              rotation: [1.0, 0.0, 0.0, 0.0]
              resolution: [64, 64]
              zoom: 10.0
            view_finder:
              position: [0.0, 0.0, 0.0]
              rotation: [1.0, 0.0, 0.0, 0.0]
              resolution: [64, 64]
              zoom: 1.0
      env_init_func: ${monty.class:tbp.monty.simulators.mujoco.MuJoCoEnvironment}
    train_env_interface_class: ${monty.class:tbp.monty.frameworks.environments.embodied_data.EnvironmentInterfacePerObject}
    train_env_interface_args:
      positioning_procedures:
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: agent_id_0
        sensor_id: view_finder
      - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
        agent_id: agent_id_0
        sensor_id: patch
        allow_translation: false
        max_orientation_attempts: 3
      object_names:
      - mug
      - bowl
      - potted_meat_can
      - spoon
      - strawberry
      - mustard_bottle
      - dice
      - golf_ball
      - c_lego_duplo
      - banana
      object_init_sampler:
        _target_: tbp.monty.frameworks.environments.object_init_samplers.Predefined
        positions: [[-0.492, -0.134, 0.388]]
        rotations: [[0.0, 0.0, 0.0]]
        scales: [[0.03, 0.03, 0.03]]
    eval_env_interface_args:
      object_names:
      - mug
      - bowl
      - potted_meat_can
      - spoon
      - strawberry
      - mustard_bottle
      - dice
      - golf_ball
      - c_lego_duplo
      - banana
      object_init_sampler:
        _target_: tbp.monty.frameworks.environments.object_init_samplers.RandomRotation
        position: [-0.492, -0.134, 0.388]
        scale: [0.03, 0.03, 0.03]
