config:
  do_train: train
  do_eval: false
  show_sensor_output: true
  max_train_steps: 50
  max_eval_steps: 500
  max_total_steps: 100
  n_train_epochs: 1
  n_eval_epochs: 1
  model_name_or_path: "" # ${constants.pretrained_dir}/surf_agent_1lm_10distinctobj/pretrained/
  min_lms_match: 1
  seed: 42
  supervised_lm_ids: []
  python_log_level: DEBUG
  logging:
    monty_log_level: BASIC
    monty_handlers:
    - ${monty.class:tbp.monty.frameworks.loggers.monty_handlers.BasicCSVStatsHandler}
    wandb_handlers: []
    #- ${monty.class:tbp.monty.frameworks.loggers.wandb_handlers.BasicWandbTableStatsHandler}
    #- ${monty.class:tbp.monty.frameworks.loggers.wandb_handlers.BasicWandbChartStatsHandler}
    python_log_level: WARNING
    python_log_to_file: true
    python_log_to_stderr: true
    output_dir: ${path.expanduser:${oc.env:MONTY_LOGS}/projects/monty_runs}
    run_name: base_config_10distinctobj_dist_agent_mujoco
    resume_wandb_run: false
    wandb_id:
      _target_: wandb.util.generate_id
    wandb_group: benchmark_experiments
  monty_config:
    motor_system_config:
      _target_: tbp.monty.frameworks.models.motor_system.MotorSystem
      policy_selector:
        _target_: tbp.monty.frameworks.models.motor_policy_selectors.SinglePolicySelector
        policy:
          _target_: tbp.monty.frameworks.models.motor_policies.InformedPolicy
          use_goal_driven_actions: true
          agent_id: agent_id_0
          action_sampler:
            _target_: tbp.monty.frameworks.actions.action_samplers.ConstantSampler
            actions:
            - ${monty.class:tbp.monty.frameworks.actions.actions.LookUp}
            - ${monty.class:tbp.monty.frameworks.actions.actions.LookDown}
            - ${monty.class:tbp.monty.frameworks.actions.actions.TurnLeft}
            - ${monty.class:tbp.monty.frameworks.actions.actions.TurnRight}
            rotation_degrees: 5.0
    monty_args:
      num_exploratory_steps: 1000
      min_eval_steps: 100
      min_train_steps: 3
      max_total_steps: 2500
    monty_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.model.MontyForEvidenceGraphMatching}
    learning_module_configs:
      learning_module_0:
        learning_module_args:
          feature_weights:
            patch:
              hsv: ${np.array:[1, 0.5, 0.5]}
              pose_vectors: ${np.ones:3}
              principal_curvatures_log: ${np.ones:2}
          tolerances:
            patch:
              hsv: ${np.array:[0.1, 0.2, 0.2]}
              principal_curvatures_log: ${np.ones:2}
          max_match_distance: 0.01
          x_percent_threshold: 20
          evidence_threshold_config: all
          max_graph_size: 0.3
          num_model_voxels_per_dim: 100
          gsg:
            _target_: tbp.monty.frameworks.models.goal_generation.EvidenceGoalGenerator
            goal_tolerances:
              location: 0.015
            elapsed_steps_factor: 10
            min_post_goal_success_steps: 5
            x_percent_scale_factor: 0.75
            desired_object_distance: 0.03
          hypotheses_updater_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.burst_sampling.BurstSamplingHypothesesUpdater}
          hypotheses_updater_args:
            max_nneighbors: 5
        learning_module_class: ${monty.class:tbp.monty.frameworks.models.evidence_matching.learning_module.EvidenceGraphLM}
    sensor_module_configs:
      sensor_module_0:
        sensor_module_class: ${monty.class:tbp.monty.frameworks.models.sensor_modules.CameraSM}
        sensor_module_args:
          sensor_module_id: patch
          features:
          - pose_vectors
          - pose_fully_defined
          - on_object
          - object_coverage
          - hsv
          - principal_curvatures_log
          delta_thresholds:
            on_object: 0
            n_steps: 20
            hsv:
            - 0.1
            - 0.1
            - 0.1
            pose_vectors: ${np.list_eval:[np.pi / 4, np.pi * 2, np.pi * 2]}
            principal_curvatures_log:
            - 2
            - 2
            distance: 0.01
          save_raw_obs: false
      sensor_module_1:
        sensor_module_class: ${monty.class:tbp.monty.frameworks.models.sensor_modules.Probe}
        sensor_module_args:
          sensor_module_id: view_finder
          save_raw_obs: false
    sm_to_agent_dict:
      patch: agent_id_0
      view_finder: agent_id_0
    sm_to_lm_matrix:
    - - 0
    lm_to_lm_matrix: null
    lm_to_lm_vote_matrix: null
  environment:
    env_init_args:
      objects:
      - name: coneSolid
        position:
        - 0.0
        - 1.5
        - -0.1
      scene_id: null
      seed: 42
      data_path: ${path.expanduser:${oc.env:MONTY_DATA}/habitat/objects/ycb}
      show_viewer: true
      agents:
        agent_args:
          agent_id: agent_id_0
          position: [0.0, 0.0, 0.0]
          rotation: [1.0, 0.0, 0.0, 0.0]
          robot_name: "robot:ur5e"
          ee_site_name: attachment_site
          home_qpos: [0.0, -1.570796, 1.570796, -1.570796, -1.570796, 0.0]
          ik_method: "damped_ls"
          ik_args:
            max_iter: 500
            tol: 0.0001
            damping: 0.05
          sensor_configs:
            patch:
              position: [0.0, 0.0, 0.0]
              rotation: [1.0, 0.0, 0.0, 0.0]
              resolution: [64, 64]
              zoom: 1.0
            view_finder:
              position: [ 0.0, 0.0, 0.0 ]
              rotation: [ 1.0, 0.0, 0.0, 0.0 ]
              resolution: [ 256, 256 ]
              zoom: 1.0
        agent_type: ${monty.class:tbp.monty.simulators.mujoco.RobotDistantAgent}
    env_init_func: ${monty.class:tbp.monty.simulators.mujoco.MuJoCoEnvironment}
    transform:
    - _target_: tbp.monty.frameworks.environment_utils.transforms.MissingToMaxDepth
      agent_id: agent_id_0
      max_depth: 1
    - _target_: tbp.monty.frameworks.environment_utils.transforms.DepthTo3DLocations
      agent_id: agent_id_0
      sensor_ids:
      - patch
      - view_finder
      resolutions:
      - - 64
        - 64
      - - 256
        - 256
      world_coord: true
      zooms:
      - 1.0
      - 1.0
      get_all_points: true
      use_semantic_sensor: false
  train_env_interface_class: ${monty.class:tbp.monty.frameworks.environments.embodied_data.EnvironmentInterfacePerObject}
  train_env_interface_args:
    positioning_procedures:
    - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
      agent_id: agent_id_0
      sensor_id: view_finder
    - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
      agent_id: agent_id_0
      sensor_id: patch
      allow_translation: false
      max_orientation_attempts: 3
    object_names:
      - sphere
    object_init_sampler:
      _target_: tbp.monty.frameworks.environments.object_init_samplers.Predefined
      positions: [[-0.492, -0.134, 0.388]]
      rotations: [[0.0,0.0,0.0]]
      scales: [[0.03,0.03,0.03]]
  eval_env_interface_args:
    positioning_procedures:
    - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
      agent_id: agent_id_0
      sensor_id: view_finder
    - _target_: tbp.monty.frameworks.environments.positioning_procedures.GetGoodViewFactory
      agent_id: agent_id_0
      sensor_id: patch
      allow_translation: false
      max_orientation_attempts: 3
    parent_to_child_mapping: null
    object_names:
    # - mug
    # - bowl
    - potted_meat_can
    # - spoon
    # - strawberry
    # - mustard_bottle
    # - dice
    # - golf_ball
    # - c_lego_duplo
    # - banana
    object_init_sampler:
      _target_: tbp.monty.frameworks.environments.object_init_samplers.Predefined
      rotations: ${constants.rotations_all}
  eval_env_interface_class: ${monty.class:tbp.monty.frameworks.environments.embodied_data.EnvironmentInterfacePerObject}
_target_: tbp.monty.frameworks.experiments.object_recognition_experiments.MontyObjectRecognitionExperiment
